# opsai-platform/docker-compose.prod.yml
version: '3.8'

services:

  # ── PostgreSQL（不对外暴露端口）
  postgres:
    image: postgres:16-alpine
    container_name: opsai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       opsai
      POSTGRES_USER:     opsai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    # 注意：生产环境不暴露 5432 端口！只有内部容器能访问
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opsai']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsai-network

  # ── 后端 FastAPI
  backend:
    image: ${DOCKER_REGISTRY}/opsai-backend:${IMAGE_TAG:-latest}
    container_name: opsai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql+asyncpg://opsai:${POSTGRES_PASSWORD}@postgres:5432/opsai
      GROQ_API_KEY:   ${GROQ_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEBUG:          'false'
    volumes:
      - backend_uploads:/app/uploads
      - backend_chroma:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opsai-network

  # ── 前端 Next.js
  frontend:
    image: ${DOCKER_REGISTRY}/opsai-frontend:${IMAGE_TAG:-latest}
    container_name: opsai-frontend
    restart: unless-stopped
    networks:
      - opsai-network

  # ── Nginx 反向代理（唯一对外暴露的服务）
  nginx:
    image: nginx:alpine
    container_name: opsai-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro  # HTTPS 证书
      - nginx_webroot:/var/www/certbot     # Let's Encrypt 验证
    depends_on:
      - frontend
      - backend
    networks:
      - opsai-network

volumes:
  postgres_data:
  backend_uploads:
  backend_chroma:
  nginx_webroot:

networks:
  opsai-network:
    driver: bridge